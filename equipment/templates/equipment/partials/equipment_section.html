<section class="mb-10 overflow-hidden rounded-2xl bg-white shadow-lg shadow-slate-200/50 ring-1 ring-slate-200/60">
    <div class="h-1.5 bg-gradient-to-r from-emerald-500 via-teal-500 to-emerald-500"></div>
    <div class="p-6 sm:p-8">
        <h2 class="flex items-center gap-2.5 text-lg font-bold text-slate-800">
            <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-emerald-50 ring-1 ring-emerald-100">
                <svg class="h-4.5 w-4.5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                </svg>
            </div>
            Ajouter du matériel
        </h2>
        <form hx-post="{% url 'equipment:equipment_create' %}"
              hx-target="#equipment-section"
              hx-swap="innerHTML"
              class="mt-6 grid gap-4 sm:grid-cols-3">
            {% csrf_token %}
            <div>
                <label for="{{ equipment_form.name.id_for_label }}" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Nom *</label>
                {{ equipment_form.name }}
                {% for error in equipment_form.name.errors %}
                <p class="mt-1 text-xs text-red-600">{{ error }}</p>
                {% endfor %}
            </div>
            <div>
                <label for="{{ equipment_form.quantity.id_for_label }}" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Quantité</label>
                {{ equipment_form.quantity }}
                {% for error in equipment_form.quantity.errors %}
                <p class="mt-1 text-xs text-red-600">{{ error }}</p>
                {% endfor %}
            </div>
            <div class="flex items-end">
                <button type="submit"
                        class="w-full rounded-xl bg-gradient-to-r from-emerald-600 to-emerald-700 px-5 py-2.5 text-sm font-semibold text-white shadow-md shadow-emerald-300/30 transition-all duration-200 hover:from-emerald-700 hover:to-emerald-800 hover:shadow-lg">
                    Ajouter
                </button>
            </div>
        </form>
    </div>
</section>

<div id="equipment-list"
     hx-get="{% url 'equipment:equipment_list' %}"
     hx-trigger="equipmentUpdated from:body"
     hx-swap="innerHTML">
    {% include "equipment/partials/equipment_list.html" %}
</div>
