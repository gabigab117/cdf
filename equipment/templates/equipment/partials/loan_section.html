<section class="mb-10 overflow-hidden rounded-2xl bg-white shadow-lg shadow-slate-200/50 ring-1 ring-slate-200/60">
    <div class="h-1.5 bg-gradient-to-r from-blason-500 via-indigo-500 to-blason-500"></div>
    <div class="p-6 sm:p-8">
        <h2 class="flex items-center gap-2.5 text-lg font-bold text-slate-800">
            <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-blason-50 ring-1 ring-blason-100">
                <svg class="h-4.5 w-4.5 text-blason-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                </svg>
            </div>
            Nouveau prêt
        </h2>
        <form hx-post="{% url 'equipment:loan_create' %}"
              hx-target="#loan-section"
              hx-swap="innerHTML"
              hx-encoding="multipart/form-data"
              class="mt-6 grid gap-4 sm:grid-cols-3">
            {% csrf_token %}
            <div>
                <label for="{{ loan_form.borrower_name.id_for_label }}" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Emprunteur *</label>
                {{ loan_form.borrower_name }}
                {% for error in loan_form.borrower_name.errors %}
                <p class="mt-1 text-xs text-red-600">{{ error }}</p>
                {% endfor %}
            </div>
            <div>
                <label for="{{ loan_form.agreement.id_for_label }}" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Convention de prêt</label>
                {{ loan_form.agreement }}
                {% for error in loan_form.agreement.errors %}
                <p class="mt-1 text-xs text-red-600">{{ error }}</p>
                {% endfor %}
            </div>
            <div class="flex items-end">
                <button type="submit"
                        class="w-full rounded-xl bg-gradient-to-r from-blason-600 to-blason-700 px-5 py-2.5 text-sm font-semibold text-white shadow-md shadow-blason-300/30 transition-all duration-200 hover:from-blason-700 hover:to-blason-800 hover:shadow-lg">
                    Créer le prêt
                </button>
            </div>
        </form>
    </div>
</section>

<div id="loan-list">
    {% include "equipment/partials/loan_list.html" %}
</div>
